<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Oracle Racing - Kiki</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- Paho MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00ccff;
            --bg-color: #0d1117;
            --text-main: #c9d1d9;
            --glass-bg: rgba(22, 27, 34, 0.8);
            --glass-border: rgba(0, 255, 136, 0.2);
            --font-mono: 'JetBrains Mono', monospace;
            --font-thai: 'Noto Sans Thai', sans-serif;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-thai);
        }

        /* UI Overlays */
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            z-index: 10;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin: 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            pointer-events: auto;
        }

        .subtitle {
            margin-top: 5px;
            opacity: 0.7;
        }

        /* Lobby */
        #lobby {
            margin-top: 10vh;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            width: 350px;
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-family: var(--font-mono);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            font-family: var(--font-thai);
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* Game UI */
        #gameUI {
            display: none;
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        .instruction {
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--primary);
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from {
                opacity: 0.7;
                transform: scale(1);
            }

            to {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        .progress-bar-container {
            width: 300px;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin: 10px auto;
            position: relative;
            overflow: hidden;
        }

        #myProgress {
            width: 0%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.1s;
        }

        /* Leaderboard / Names overlay */
        #nameTagsContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .player-label {
            position: absolute;
            color: #fff;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 6px;
            border-radius: 4px;
            transform: translate(-50%, -100%);
            white-space: nowrap;
            text-shadow: 1px 1px 2px #000;
        }

        /* Hall of Fame */
        #hallOfFame {
            margin-top: 20px;
            background: var(--glass-bg);
            border: 1px solid gold;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            width: 320px;
            margin-left: auto;
            margin-right: auto;
            pointer-events: auto;
        }

        .hof-title {
            color: gold;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .hof-record {
            font-family: var(--font-mono);
            font-size: 1.3rem;
            color: #fff;
        }

        /* Notifications */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: var(--secondary);
            color: #000;
            text-align: center;
            border-radius: 4px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-weight: bold;
            font-family: var(--font-thai);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {
                bottom: 0;
                opacity: 0;
            }

            to {
                bottom: 30px;
                opacity: 1;
            }
        }

        @keyframes fadeout {
            from {
                bottom: 30px;
                opacity: 1;
            }

            to {
                bottom: 0;
                opacity: 0;
            }
        }

        .nav-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--primary);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 14px;
            pointer-events: auto;
        }

        .nav-link:hover {
            text-decoration: underline;
        }

        #canvas3D {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
    </style>
</head>

<body>

    <!-- 3D Canvas -->
    <div id="canvas3D"></div>

    <!-- UI Overlay -->
    <div id="uiLayer">
        <a href="index.html" class="nav-link">← Back</a>
        <h1>🚀 3D Rocket Racing</h1>
        <p class="subtitle">Mash Spacebar - First to the Neon Wall wins!</p>

        <!-- Lobby -->
        <div id="lobby">
            <h2>เตรียมพร้อมปล่อยยาน</h2>
            <input type="text" id="playerName" placeholder="ใส่ชื่อ Oracle เช่น Kiki" maxlength="15">
            <button id="joinBtn">CONNECT TO GRID</button>

            <!-- Hall of Fame -->
            <div id="hallOfFame">
                <div class="hof-title">🏆 Fast Time Record</div>
                <div class="hof-record" id="hofData">Loading MQTT...</div>
            </div>
            <p style="font-size: 12px; color: gray; margin-top: 15px;">Powered by MQTT on broker.emqx.io</p>
        </div>
    </div>

    <!-- HUD -->
    <div id="gameUI">
        <div class="instruction">💥 MASH SPACEBAR 💥</div>
        <div class="progress-bar-container">
            <div id="myProgress"></div>
        </div>
    </div>

    <!-- 2D Screen Overlay for Names -->
    <div id="nameTagsContainer"></div>

    <div id="toast"></div>

    <script>
        /**
         * 1. MQTT SETTINGS
         */
        let mqttClient;
        const brokerUrl = "broker.emqx.io";
        const brokerPort = 8084;
        const clientId = "kiki_racer3d_" + Math.random().toString(16).substr(2, 8);

        const TOPIC_BASE = "kiki-oracle/race3d/";
        const TOPIC_POS = TOPIC_BASE + "pos/";
        const TOPIC_HOF = TOPIC_BASE + "hof";

        let myName = "";
        let myProgress = 0; // 0 to 100
        let isRacing = false;
        let startTime = 0;
        let currentHofTime = 999.99;

        // Player states: { name: { progress, 3dModel, labelElement, lane } }
        const players = {};
        let laneCounter = -2; // Used to space players out on the X axis

        // UI Config
        const RACE_LENGTH = 1000; // Z-axis units
        const START_Z = 0;
        const FINISH_Z = -RACE_LENGTH;

        /**
         * 2. THREE.JS SETUP
         */
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0d1117, 0.0015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas3D').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        // Environment (Grid / Track)
        const gridHelper = new THREE.GridHelper(400, 40, 0x00ff88, 0x004422);
        gridHelper.position.y = -5;
        gridHelper.scale.set(1, 1, 10); // Stretch along Z axis
        scene.add(gridHelper);

        // Finish Line Wall
        const wallGeo = new THREE.PlaneGeometry(200, 50);
        const wallMat = new THREE.MeshBasicMaterial({
            color: 0x00ccff,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.5,
            wireframe: true
        });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(0, 20, FINISH_Z - 10);
        scene.add(wall);

        // Stars / Particles
        const particlesGeo = new THREE.BufferGeometry();
        const particlesCount = 1000;
        const posArray = new Float32Array(particlesCount * 3);
        for (let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 1000;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMat = new THREE.PointsMaterial({ size: 2, color: 0xffffff });
        const particlesMesh = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particlesMesh);

        // Default Camera position (lobby view)
        camera.position.set(0, 10, 50);
        camera.lookAt(0, 0, -100);

        /**
         * Helper: Create 3D Rocket
         */
        function createRocket(colorStr) {
            const group = new THREE.Group();

            // Body
            const bodyGeo = new THREE.CylinderGeometry(1, 1.5, 6, 8);
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0xcccccc });
            const body = new THREE.Mesh(bodyGeo, bodyMat);

            // Nose
            const noseGeo = new THREE.ConeGeometry(1, 3, 8);
            const noseMat = new THREE.MeshPhongMaterial({ color: colorStr });
            const nose = new THREE.Mesh(noseGeo, noseMat);
            nose.position.y = 4.5;

            // Fins
            const finGeo = new THREE.BoxGeometry(4, 2, 0.2);
            const finMat = new THREE.MeshPhongMaterial({ color: colorStr });
            const fin = new THREE.Mesh(finGeo, finMat);
            fin.position.y = -2;

            const fin2 = new THREE.Mesh(finGeo, finMat);
            fin2.position.y = -2;
            fin2.rotation.y = Math.PI / 2;

            group.add(body);
            group.add(nose);
            group.add(fin);
            group.add(fin2);

            // Rotate so it points along Z axis (into screen)
            group.rotation.x = -Math.PI / 2;
            return group;
        }

        // Color generator for players
        const colors = [0x00ff88, 0x00ccff, 0xff00cc, 0xffff00, 0xff5500];
        function getColorForName(name) {
            let sum = 0;
            for (let i = 0; i < name.length; i++) sum += name.charCodeAt(i);
            return colors[sum % colors.length];
        }

        // Add player to 3D world
        function addPlayer(name, progress) {
            if (players[name]) return; // Already exists

            // Randomize lane a bit if many players (-40 to 40 step 10)
            let xOffset = laneCounter * 15;
            laneCounter = (laneCounter >= 2) ? -2 : laneCounter + 1;

            const mesh = createRocket(getColorForName(name));
            mesh.position.set(xOffset, 0, START_Z);
            scene.add(mesh);

            // Create 2D Label
            const label = document.createElement('div');
            label.className = 'player-label';
            label.innerText = name;
            document.getElementById('nameTagsContainer').appendChild(label);

            players[name] = {
                progress: progress,
                mesh: mesh,
                label: label,
                targetZ: START_Z
            };

            updatePlayerPosition(name, progress);
        }

        function updatePlayerPosition(name, progress) {
            if (!players[name]) addPlayer(name, 0);

            players[name].progress = progress;
            // Map 0-100 to START_Z to FINISH_Z
            let z = START_Z - (progress / 100) * RACE_LENGTH;
            players[name].targetZ = z;
        }

        /**
         * 3. GAME LOGIC & INPUT
         */
        function startGame() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) { showToast("กรุณาใส่ชื่อ!"); return; }
            if (name.length > 15) { showToast("ชื่อยาวไป!"); return; }

            myName = name;
            myProgress = 0;
            isRacing = true;
            startTime = Date.now();

            // Hide Lobby
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('gameUI').style.display = 'block';

            addPlayer(myName, 0);

            window.focus();
            document.addEventListener('keydown', handleKeyPress);
        }

        function handleKeyPress(e) {
            if (e.code === 'Space' && isRacing) {
                e.preventDefault();
                myProgress += 1.5; // Require more mashes for a longer track!
                if (myProgress >= 100) {
                    myProgress = 100;
                    finishRace();
                }

                document.getElementById('myProgress').style.width = myProgress + '%';
                updatePlayerPosition(myName, myProgress);
                publishProgress();
            }
        }

        function finishRace() {
            isRacing = false;
            document.removeEventListener('keydown', handleKeyPress);

            const timeSecs = ((Date.now() - startTime) / 1000).toFixed(2);
            showToast(`🏁 เข้าเส้นชัย! เวลาของคุณ: ${timeSecs} วิ`);

            checkAndPublishHOF(timeSecs);

            // Wait a bit, then reload to play again
            setTimeout(() => {
                const btn = document.createElement('button');
                btn.innerText = "Replay";
                btn.style.width = "200px";
                btn.style.pointerEvents = "auto";
                btn.onclick = () => location.reload();
                document.getElementById('gameUI').appendChild(btn);
            }, 3000);
        }

        /**
         * 4. MQTT LOGIC
         */
        function connectMQTT() {
            mqttClient = new Paho.MQTT.Client(brokerUrl, brokerPort, clientId);

            mqttClient.onConnectionLost = (resp) => {
                showToast("Connection Lost. Reconnecting...");
                setTimeout(connectMQTT, 3000);
            };

            mqttClient.onMessageArrived = (msg) => {
                const topic = msg.destinationName;
                const pl = msg.payloadString;

                if (topic === TOPIC_HOF) {
                    try {
                        const data = JSON.parse(pl);
                        if (data.name && data.time) {
                            currentHofTime = parseFloat(data.time);
                            document.getElementById('hofData').innerHTML = `<span style="color:var(--primary)">${data.name}</span><br>${data.time} s`;
                        }
                    } catch (e) { }
                } else if (topic.startsWith(TOPIC_POS)) {
                    const pName = topic.replace(TOPIC_POS, "");
                    // Ignore echo
                    if (pName !== myName) {
                        updatePlayerPosition(pName, parseFloat(pl));
                    }
                }
            };

            mqttClient.connect({
                useSSL: true,
                onSuccess: () => {
                    console.log("MQTT Connected");
                    mqttClient.subscribe(TOPIC_POS + "+");
                    mqttClient.subscribe(TOPIC_HOF);
                },
                onFailure: (err) => {
                    showToast("Failed to connect to Broker");
                }
            });
        }

        function publishProgress() {
            if (mqttClient && mqttClient.isConnected()) {
                const msg = new Paho.MQTT.Message(myProgress.toString());
                msg.destinationName = TOPIC_POS + myName;
                msg.qos = 0;
                mqttClient.send(msg);
            }
        }

        function checkAndPublishHOF(timeStr) {
            const timeNum = parseFloat(timeStr);
            if (timeNum < currentHofTime) {
                if (mqttClient && mqttClient.isConnected()) {
                    const payload = JSON.stringify({ name: myName, time: timeNum });
                    const msg = new Paho.MQTT.Message(payload);
                    msg.destinationName = TOPIC_HOF;
                    msg.retained = true;
                    msg.qos = 1;
                    mqttClient.send(msg);
                    showToast("🏆 NEW HALL OF FAME RECORD!");
                }
            }
        }

        /**
         * 5. ANIMATION LOOP
         */
        function animate() {
            requestAnimationFrame(animate);

            particlesMesh.rotation.y += 0.0005;

            // Interpolate player rockets and update labels
            const hw = window.innerWidth / 2;
            const hh = window.innerHeight / 2;

            for (const name in players) {
                const p = players[name];

                // Smooth move Z
                p.mesh.position.z += (p.targetZ - p.mesh.position.z) * 0.1;

                // Sync 2D Label to 3D position
                const vector = p.mesh.position.clone();
                vector.y += 5; // above rocket
                vector.project(camera);

                if (vector.z < 1) { // Render normally if in front of camera
                    p.label.style.display = 'block';
                    p.label.style.transform = `translate(-50%, -100%) translate(${(vector.x * hw) + hw}px, ${-(vector.y * hh) + hh}px)`;
                } else {
                    p.label.style.display = 'none'; // Behind camera
                }
            }

            // Camera Follow Logic (if racing)
            if (isRacing && players[myName]) {
                const myMesh = players[myName].mesh;
                // Camera follows behind and above
                camera.position.x += (myMesh.position.x - camera.position.x) * 0.05;
                camera.position.y = 15;

                // Target camera Z to be slightly behind the rocket
                const targetCamZ = myMesh.position.z + 40;
                camera.position.z += (targetCamZ - camera.position.z) * 0.2;

                // Look slightly ahead
                camera.lookAt(myMesh.position.x, 0, myMesh.position.z - 100);
            }

            renderer.render(scene, camera);
        }

        // Init
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('joinBtn').addEventListener('click', startGame);
        document.getElementById('playerName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startGame();
        });

        connectMQTT();
        animate();

        // Fallback for HOF
        setTimeout(() => {
            const h = document.getElementById('hofData');
            if (h.innerText === "Loading MQTT...") h.innerText = "ยังไม่มีสถิติ (รอผู้ท้าชิง!)";
        }, 4000);

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
        }

    </script>
</body>

</html>
